<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#065f46"/>
  <!-- graduation cap: flat diamond/square top -->
  <polygon points="32,10 56,23 32,36 8,23" fill="#ffffff"/>
  <!-- cap stem: both sides down -->
  <rect x="29" y="34" width="6" height="14" rx="2" fill="#ffffff"/>
  <!-- flat board on stem -->
  <rect x="20" y="46" width="24" height="5" rx="2.5" fill="#ffffff"/>
  <!-- tassel cord from right -->
  <line x1="52" y1="23" x2="52" y2="38" stroke="#d1fae5" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="52" cy="41" r="3" fill="#d1fae5"/>
</svg>
